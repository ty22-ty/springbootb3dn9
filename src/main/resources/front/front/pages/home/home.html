<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>首页</title>
	<meta name="description" content="" />
	<meta name="keywords" content="" />
	<meta name="author" content="order by mobanxiu.cn" />
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<link href="https://cdn.bootcdn.net/ajax/libs/Swiper/5.4.5/css/swiper.min.css" rel="stylesheet">
	<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
	<link rel="stylesheet" href="../../xznstatic/css/style.css"/>
	<script src="../../xznstatic/js/jquery-1.11.3.min.js"></script>
	<script src="../../xznstatic/js/jquery.SuperSlide.2.1.1.js"></script>
</head>
<style>
	html::after {
		position: fixed;
		top: 0;
		right: 0;
		left: 0;
		bottom: 0;
		content: '';
		display: block;
		background-attachment: fixed;
		background-size: cover;
		background-position: center;
	}
	#test1 {
		overflow: hidden;
	}
	#test1 .layui-carousel-ind li {
		width: 100px;
		height: 2px;
		border-width: 0;
		border-style: solid;
		border-color: rgba(0,0,0,.3);
		border-radius: 0px;
		background-color: #f7f7f7;
		box-shadow: 0 0 0px rgba(255,0,0,.8);
	}
	#test1 .layui-carousel-ind li.layui-this {
		width: 100px;
		height: 2px;
		border-width: 0;
		border-style: solid;
		border-color: rgba(0,0,0,.3);
		border-radius: 0;
		background-color: rgba(255, 255, 255, 1);
		box-shadow: 0 0 0px rgba(255,0,0,.8);
	}

	.recommend {
		padding: 10px 0;
		display: flex;
		justify-content: center;
		background-repeat: no-repeat;
		background-position: center center;
		background-size: cover;
	}

	.recommend .box {
		width: 1014px;
	}

	.recommend .box .title {
		padding: 10px 5px;
		display: flex;
		justify-content: center;
		align-items: center;
		flex-direction: column;
	}

	.recommend .box .title span {
		padding: 0 10px;
		line-height: 1.4;
	}

	.recommend .box .list {
		display: flex;
		flex-wrap: wrap;
	}
	.index-pv1 .box .list .list-item {
		flex: 0 0 20%;
		padding: 0 5px;
		box-sizing: border-box;
	}

	.recommend .box .list .list-item-body {
		border: 1px solid rgba(0, 0, 0, 3);
		padding: 5px;
		box-sizing: border-box;
		cursor: pointer;
	}

	.recommend .box .list img {
		width: 100%;
		height: 100px;
		display: block;
		margin: 0 auto;
		object-fit: cover;
		max-width: 100%;
	}

	.recommend .box .list .name {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		text-align: center;
		box-sizing: border-box;
	}

	.recommend .box .list .list-item3 {
		flex: 0 0 33.33%;
	}

	.recommend .box .list .list-item5 {
		flex: 0 0 20%;
	}

	.news {
		padding: 10px 0;
		display: flex;
		justify-content: center;
		background-repeat: no-repeat;
		background-position: center center;
		background-size: cover;
		width: 100%;
	}

	.news .box {
		width: 1014px;
	}

	.news .box .title {
		padding: 10px 5px;
		display: flex;
		justify-content: center;
		align-items: center;
		flex-direction: column;
	}

	.news .box .title span {
		padding: 0 10px;
		line-height: 1.4;
	}

	.news .box .list {
		display: flex;
		flex-wrap: wrap;
	}
	.index-pv2 .box .list .list-item {
		flex: 0 0 50%;
		padding: 0 10px;
		box-sizing: border-box;
	}

	.news .box .list .list-item .list-item-body {
		border: 1px solid rgba(0, 0, 0, 3);
		padding: 10px;
		box-sizing: border-box;
		display: flex;
		cursor: pointer;
	}

	.news .box .list .list-item .list-item-body img {
		width: 120px;
		height: 100%;
		display: block;
		margin: 0 auto;
		object-fit: cover;
		max-width: 100%;
	}

	.news .box .list .list-item .list-item-body .item-info {
		flex: 1;
		display: flex;
		justify-content: space-between;
		flex-direction: column;
		padding-left: 10px;
		box-sizing: border-box;
	}

	.news .box .list .list-item .list-item-body .item-info .name {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		box-sizing: border-box;
		overflow: hidden;
		text-overflow: ellipsis;
		display: -webkit-box;
		-webkit-line-clamp: 1;
		-webkit-box-orient: vertical;
	}

	.news .box .list .list-item .list-item-body .item-info .time {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		overflow: hidden;
		text-overflow: ellipsis;
		display: -webkit-box;
		-webkit-line-clamp: 1;
		-webkit-box-orient: vertical;
	}

	.news .box .list .list-item1 {
		flex: 0 0 100%;
	}

	.news .box .list .list-item3 {
		flex: 0 0 33.33%;
	}

	.lists {
		padding: 10px 0;
		display: flex;
		justify-content: center;
		background-repeat: no-repeat;
		background-position: center center;
		background-size: cover;
	}

	.lists .box {
		width: 1014px;
		overflow: hidden;
	}

	.lists .box .title {
		padding: 10px 5px;
		display: flex;
		justify-content: center;
		align-items: center;
		flex-direction: column;
	}

	.lists .box .title span {
		padding: 0 10px;
		line-height: 1.4;
	}

	.lists .box .swiper-slide {
		box-sizing: border-box;
		cursor: pointer;
	}

	.lists .box .swiper-slide .img-box {
		width: 100%;
		overflow: hidden;
	}

	.lists .box .swiper-slide .img-box img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		max-width: 100%;
	}

	.index-pv3 .box .list .list-item {
		flex: 0 0 25%;
		padding: 0 10px;
		box-sizing: border-box;
	}

	.index-pv1 .animation-box:hover {
		transform: perspective(1000px) translate3d(0px, 0px, 0px) scale(1.2) rotate(0deg) skew(0deg, 0deg);
		transition: all 0.3s;
	}
	.index-pv2 .animation-box:hover {
		transform: perspective(1000px) translate3d(0px, 0px, 0px) scale(1.2) rotate(0deg) skew(0deg, 0deg);
		transition: all 0.3s;
	}
	.index-pv3 .animation-box:hover {
		transform: perspective(1000px) translate3d(0px, 0px, 0px) scale(1.2) rotate(0deg) skew(0deg, 0deg);
		transition: all 0.3s;
	}
</style>
<body>
<div id="app">
	<div class="banner">
		<div class="layui-carousel" id="test1" :style='{"boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0 auto","borderColor":"rgba(0,0,0,.3)","borderRadius":"0px","borderWidth":"0","width":"100%","borderStyle":"solid"}'>
			<div carousel-item>
				<div v-for="(item,index) in swiperList" :key="index">
					<img style="width: 100%;height: 100%;object-fit:cover;" :src="item.img" />
				</div>
			</div>
		</div>
	</div>


	<div id="content">
		<!-- 网站公告 -->
		<div class="news index-pv2" :style='{"padding":"10px 0 10px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"10px 0 0 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(167, 198, 249, 1)","borderRadius":"0","borderWidth":"0","borderStyle":"solid"}'>
			<div class="box" style='width:60%'>
				<div class="title" :style='{"padding":"3px 0 3px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"5px 0 10px 0","borderColor":"rgba(255, 69, 0, 1)","backgroundColor":"rgba(247, 247, 247, 1)","color":"rgba(255, 69, 0, 1)","borderRadius":"0px 30px 30px 0px","alignItems":"flex-start","borderWidth":"2px 40px 2px 30px","fontSize":"16px","borderStyle":"solid"}'>
					<span>HOME NEWS</span><span>网站公告</span>
				</div>
				<div class="list">
					<!-- 加v-if兜底，空数据显示暂无公告 -->
					<template v-if="newsList && newsList.length > 0">
						<div v-for="(item,index) in newsList" :key="index" class="list-item" @click="jump('../news/detail.html?id='+item.id)">
							<div class="list-item-body animation-box" :style='{"padding":"6px","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0 0 10px 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"#fff","borderRadius":"10px","borderWidth":"0","borderStyle":"solid"}'>
								<img :style='{"boxShadow":"0 0 0px rgba(255,0,0,.8)","borderColor":"rgba(0,0,0,.3)","borderRadius":"0","borderWidth":"0","width":"120px","borderStyle":"solid","height":"100%"}' :src="item.picture" alt="" />
								<div class="item-info">
									<div class="name">{{item.title}}</div>
									<div class="time">{{item.addtime}}</div>
								</div>
							</div>
						</div>
					</template>
					<!-- 空数据兜底 -->
					<div v-else style="width:100%;text-align:center;padding:20px;">暂无公告</div>
				</div>
				<div class="clear"></div>
				<div style="text-align: center;">
					<!-- 修复button闭合标签错误 -->
					<button @click="jump('../news/list.html')" style="display: block;cursor: pointer;" type="button" :style='{"padding":"0 15px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"4px auto","borderColor":"#ccc","backgroundColor":"#fff","color":"red","borderRadius":"6px","borderWidth":"0","width":"auto","fontSize":"14px","borderStyle":"solid","height":"34px"}'>查看更多<i class="layui-icon layui-icon-next"></i></button>
				</div>
			</div>
		</div>

		<!-- 离校流程展示 -->
		<div class="news index-pv3" :style='{"padding":"10px 0 10px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0px 0 0 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(255, 255, 255, 1)","borderRadius":"0","borderWidth":"0","borderStyle":"solid"}'>
			<div class="box" style='width:60%'>
				<div class="title" :style='{"padding":"3px 0 3px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"5px 0 10px 0","borderColor":"rgba(255, 0, 0, 1)","backgroundColor":"#f7f7f7","color":"rgba(255, 0, 0, 1)","borderRadius":"0px 30px 30px 0px","alignItems":"flex-start","borderWidth":"2px 40px 2px 30px","fontSize":"16px","borderStyle":"solid"}'>
					<span>DATA SHOW</span><span>离校流程展示</span>
				</div>
				<div class="list">
					<!-- 加v-if兜底，空数据显示暂无流程 -->
					<template v-if="lixiaoliuchengList && lixiaoliuchengList.length > 0">
						<div v-for="(item,index) in lixiaoliuchengList" :key="index" @click="jump('../lixiaoliucheng/detail.html?id='+item.id)">
							<div class="list-item-body animation-box" :style='{"padding":"6px","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0 0 10px 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"#fff","borderRadius":"4px","borderWidth":"0","borderStyle":"solid"}'>
								<img :style='{"boxShadow":"0 0 0px rgba(255,0,0,.8)","borderColor":"rgba(0,0,0,.3)","borderRadius":"100%","borderWidth":"0","width":"170px","borderStyle":"solid","height":"170px"}' :src="item.tupian?item.tupian.split(',')[0]:''" alt="" />
								<div class="item-info">
									<div class="name">{{item.biaoti}}</div>
								</div>
							</div>
						</div>
					</template>
					<!-- 空数据兜底 -->
					<div v-else style="width:100%;text-align:center;padding:20px;">暂无离校流程</div>
				</div>
				<div class="clear"></div>
				<div style="text-align: center;">
					<!-- 修复button闭合标签错误 -->
					<button @click="jump('../lixiaoliucheng/list.html')" style="display: block;cursor: pointer;" type="button" :style='{"padding":"0 15px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"4px auto","borderColor":"#ccc","backgroundColor":"#fff","color":"red","borderRadius":"6px","borderWidth":"0","width":"auto","fontSize":"14px","borderStyle":"solid","height":"34px"}'>查看更多<i class="layui-icon layui-icon-next"></i></button>
				</div>
			</div>
		</div>

	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/Swiper/5.4.5/js/swiper.min.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script type="text/javascript">
	var vue = new Vue({
		el: '#app',
		data: {
			lixiaoliuchengList: [],
			swiperList: [],
			newsList: [],
			leftNewsList: [],
			rightNewsList: []
		},
		filters: {
			newsDesc: function(val) {
				if (val) {
					val = val.replace(/<[^<>]+>/g, '').replace(/undefined/g, '');
					if (val.length > 60) {
						val = val.substring(0, 60);
					}
					return val;
				}
				return '';
			}
		},
		methods: {
			jump(url) {
				jump(url)
			},
		}
	});

	layui.use(['layer', 'form', 'element', 'carousel', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var form = layui.form;
		var carousel = layui.carousel;
		var http = layui.http;
		var jquery = layui.jquery;

		// 获取轮播图 数据
		http.request('config/list', 'get', {
			page: 1,
			limit: 5
		}, function(res) {
			if (res.data.list.length > 0) {
				let swiperList = [];
				res.data.list.forEach(element => {
					if (element.value != null) {
						swiperList.push({
							img: element.value
						});
					}
				});
				vue.swiperList = swiperList;
				vue.$nextTick(() => {
					carousel.render({
						elem: '#test1',
						width: '100%',
						height: '300px',
						arrow: 'hover',
						anim: 'fade',
						autoplay: 'true',
						interval: 3000,
						indicator: 'inside'
					});
				})
			}
		}, function(err){
			layer.msg('轮播图加载失败');
			console.error(err);
		});

		// 网站公告
		http.request('news/list', 'get', {
			page: 1,
			limit: 4,
			order: 'desc'
		}, function(res) {
			var newsList = res.data.list;
			vue.newsList = newsList;
			if (newsList.length > 0 && newsList.length <= 2) {
				vue.leftNewsList = res.data.list
			} else {
				var leftNewsList = []
				for (let i = 0; i <= 2; i++) {
					leftNewsList.push(newsList[i]);
				}
				vue.leftNewsList = leftNewsList
			}
			if (newsList.length > 2 && newsList.length <= 8) {
				var rightNewsList = []
				for (let i = 3; i <= newsList.length; i++) {
					rightNewsList.push(newsList[i]);
				}
				vue.rightNewsList = rightNewsList
			}
		}, function(err){
			layer.msg('公告加载失败');
			console.error(err);
		});

		// 离校流程
		http.request(`lixiaoliucheng/list`, 'get', {
			sfsh: '是',
			page: 1,
			limit: 8
		}, function(res) {
			vue.lixiaoliuchengList = res.data.list;
		}, function(err){
			layer.msg('离校流程加载失败');
			console.error(err);
		});
	});

	window.xznSlide = function() {
		jQuery("#ifocus").slide({ titCell:"#ifocus_btn li", mainCell:"#ifocus_piclist ul",effect:"leftLoop", delayTime:200, autoPlay:true,triggerTime:0});
		jQuery("#ifocus").slide({ titCell:"#ifocus_btn li", mainCell:"#ifocus_tx ul",delayTime:0, autoPlay:true});
		jQuery(".product_list").slide({mainCell:".bd ul",autoPage:true,effect:"leftLoop",autoPlay:true,vis:5,trigger:"click",interTime:4000});
	};
</script>
<script src="../../xznstatic/js/index.js"></script>
</body>
</html>
